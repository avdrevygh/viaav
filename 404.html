<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>404 — Andre Joseph</title>
        <meta name="description" content="Page not found." />
        <meta name="robots" content="noindex" />
        <link
            rel="icon"
            type="image/svg+xml"
            href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%230e0e0f'/><rect x='6' y='20' width='14' height='4' rx='1' fill='%23e8e8e8'/></svg>"
        />
        <link rel="stylesheet" href="assets/css/main.css" />
    </head>
    <body>
        <button
            class="toggle-btn"
            onclick="toggleTheme()"
            title="Toggle light/dark mode"
            aria-label="Toggle light/dark mode"
        >
            <span id="theme-icon">☀</span>
        </button>

        <main class="card">
            <header>
                <p class="code-404">404</p>
                <p class="label-404">page not found</p>
            </header>

            <div class="divider"></div>

            <p class="message-404">
                The page you're looking for <strong>doesn't exist</strong> or
                may have been moved. Double-check the URL or head back to the
                home page.
            </p>

            <a class="home-btn" href="index.html">
                <span class="home-btn-arrow">←</span>
                back to home
            </a>

            <footer class="footer">
                Designed & developed by &lt;/andre&gt; | 2026
            </footer>
        </main>

        <script>
            const root = document.documentElement;
            const icon = document.getElementById("theme-icon");
            function applyTheme(t) {
                root.classList.toggle("light", t === "light");
                icon.textContent = t === "light" ? "☾" : "☀";
            }
            function toggleTheme() {
                const next = root.classList.contains("light")
                    ? "dark"
                    : "light";
                localStorage.setItem("theme", next);
                applyTheme(next);
            }
            applyTheme(localStorage.getItem("theme") || "dark");
        </script>
    </body>
</html>
